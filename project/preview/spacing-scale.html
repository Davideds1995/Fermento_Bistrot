<!DOCTYPE html>
<html lang="it"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);background-image:var(--grain);padding:22px;color:var(--ink);font-family:var(--font-body);}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{flex:1;min-width:90px;border-radius:var(--r-sm);height:78px;border:1px solid var(--line);display:flex;align-items:flex-end;padding:8px}
  .sw b{font-family:var(--font-engrave);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase}
  .meta{display:flex;flex-direction:column;gap:2px}
  .hex{font-family:var(--font-engrave);font-size:.62rem;letter-spacing:.06em}
  .lbl{font-family:var(--font-engrave);text-transform:uppercase;letter-spacing:.14em;font-size:.6rem;color:var(--ink-500)}
  .tok{font-family:var(--font-engrave);font-size:.62rem;letter-spacing:.05em;color:var(--ink-500);margin-top:6px}
  *{box-sizing:border-box}
</style></head><body>
<div class="lbl" style="margin-bottom:14px">Spacing — 8pt base, generous whitespace</div>
<div style="display:flex;align-items:flex-end;gap:10px">
<div style="text-align:center"><div style="width:4px;height:4px;background:var(--gold);opacity:.85"></div><div style="font-family:var(--font-engrave);font-size:.56rem;color:var(--ink-500);margin-top:6px">4</div></div><div style="text-align:center"><div style="width:8px;height:8px;background:var(--gold);opacity:.85"></div><div style="font-family:var(--font-engrave);font-size:.56rem;color:var(--ink-500);margin-top:6px">8</div></div><div style="text-align:center"><div style="width:12px;height:12px;background:var(--gold);opacity:.85"></div><div style="font-family:var(--font-engrave);font-size:.56rem;color:var(--ink-500);margin-top:6px">12</div></div><div style="text-align:center"><div style="width:16px;height:16px;background:var(--gold);opacity:.85"></div><div style="font-family:var(--font-engrave);font-size:.56rem;color:var(--ink-500);margin-top:6px">16</div></div><div style="text-align:center"><div style="width:24px;height:24px;background:var(--gold);opacity:.85"></div><div style="font-family:var(--font-engrave);font-size:.56rem;color:var(--ink-500);margin-top:6px">24</div></div><div style="text-align:center"><div style="width:32px;height:32px;background:var(--gold);opacity:.85"></div><div style="font-family:var(--font-engrave);font-size:.56rem;color:var(--ink-500);margin-top:6px">32</div></div><div style="text-align:center"><div style="width:48px;height:48px;background:var(--gold);opacity:.85"></div><div style="font-family:var(--font-engrave);font-size:.56rem;color:var(--ink-500);margin-top:6px">48</div></div><div style="text-align:center"><div style="width:64px;height:64px;background:var(--gold);opacity:.85"></div><div style="font-family:var(--font-engrave);font-size:.56rem;color:var(--ink-500);margin-top:6px">64</div></div>
</div></body></html>
