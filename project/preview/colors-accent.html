<!DOCTYPE html>
<html lang="it"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);background-image:var(--grain);padding:22px;color:var(--ink);font-family:var(--font-body);}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{flex:1;min-width:90px;border-radius:var(--r-sm);height:78px;border:1px solid var(--line);display:flex;align-items:flex-end;padding:8px}
  .sw b{font-family:var(--font-engrave);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase}
  .meta{display:flex;flex-direction:column;gap:2px}
  .hex{font-family:var(--font-engrave);font-size:.62rem;letter-spacing:.06em}
  .lbl{font-family:var(--font-engrave);text-transform:uppercase;letter-spacing:.14em;font-size:.6rem;color:var(--ink-500)}
  .tok{font-family:var(--font-engrave);font-size:.62rem;letter-spacing:.05em;color:var(--ink-500);margin-top:6px}
  *{box-sizing:border-box}
</style></head><body><div class="row">
<div class="sw" style="background:var(--gold);color:var(--paper-2)"><div class="meta"><b>Gold</b><span class="hex">#9C7C46</span></div></div>
<div class="sw" style="background:var(--gold-deep);color:var(--paper-2)"><div class="meta"><b>Gold deep</b><span class="hex">#7E6231</span></div></div>
<div class="sw" style="background:var(--gold-soft);color:var(--paper-2)"><div class="meta"><b>Gold soft</b><span class="hex">#B79A66</span></div></div>
<div class="sw" style="background:var(--terracotta);color:var(--paper-2)"><div class="meta"><b>Terracotta</b><span class="hex">#AE5A3C</span></div></div>
</div><div class="tok">Warm accent — antique gold (discreet: filets, prices, eyebrows). Terracotta used sparingly for required-field marks & destructive actions.</div></body></html>
