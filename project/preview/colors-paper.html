<!DOCTYPE html>
<html lang="it"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:#fff;background-image:var(--grain);padding:22px;color:var(--ink);font-family:var(--font-body);}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{flex:1;min-width:90px;border-radius:var(--r-sm);height:78px;border:1px solid var(--line);display:flex;align-items:flex-end;padding:8px}
  .sw b{font-family:var(--font-engrave);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase}
  .meta{display:flex;flex-direction:column;gap:2px}
  .hex{font-family:var(--font-engrave);font-size:.62rem;letter-spacing:.06em}
  .lbl{font-family:var(--font-engrave);text-transform:uppercase;letter-spacing:.14em;font-size:.6rem;color:var(--ink-500)}
  .tok{font-family:var(--font-engrave);font-size:.62rem;letter-spacing:.05em;color:var(--ink-500);margin-top:6px}
  *{box-sizing:border-box}
</style></head><body><div class="row">
<div class="sw" style="background:var(--paper-2);color:var(--ink-900)"><div class="meta"><b>Paper 2</b><span class="hex">#FBF6EA</span></div></div>
<div class="sw" style="background:var(--paper);color:var(--ink-900)"><div class="meta"><b>Paper</b><span class="hex">#F4ECDA</span></div></div>
<div class="sw" style="background:var(--paper-3);color:var(--ink-900)"><div class="meta"><b>Paper 3</b><span class="hex">#ECE2CC</span></div></div>
<div class="sw" style="background:var(--paper-4);color:var(--ink-900)"><div class="meta"><b>Paper 4</b><span class="hex">#E4D8BE</span></div></div>
<div class="sw" style="background:var(--ink-bg);color:var(--paper-2)"><div class="meta"><b>Ink ground</b><span class="hex">#23252B</span></div></div>
</div><div class="tok">Cream / off-white grounds. Off-white base, warmer bands for alternate sections, ink ground for footer & reservation block.</div></body></html>
