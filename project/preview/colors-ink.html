<!DOCTYPE html>
<html lang="it"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);background-image:var(--grain);padding:22px;color:var(--ink);font-family:var(--font-body);}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{flex:1;min-width:90px;border-radius:var(--r-sm);height:78px;border:1px solid var(--line);display:flex;align-items:flex-end;padding:8px}
  .sw b{font-family:var(--font-engrave);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase}
  .meta{display:flex;flex-direction:column;gap:2px}
  .hex{font-family:var(--font-engrave);font-size:.62rem;letter-spacing:.06em}
  .lbl{font-family:var(--font-engrave);text-transform:uppercase;letter-spacing:.14em;font-size:.6rem;color:var(--ink-500)}
  .tok{font-family:var(--font-engrave);font-size:.62rem;letter-spacing:.05em;color:var(--ink-500);margin-top:6px}
  *{box-sizing:border-box}
</style></head><body><div class="row">
<div class="sw" style="background:var(--ink-900);color:var(--paper-2)"><div class="meta"><b>Ink 900</b><span class="hex">#1C1E23</span></div></div>
<div class="sw" style="background:var(--ink);color:var(--paper-2)"><div class="meta"><b>Ink</b><span class="hex">#2C2E35</span></div></div>
<div class="sw" style="background:var(--ink-700);color:var(--paper-2)"><div class="meta"><b>Ink 700</b><span class="hex">#43454D</span></div></div>
<div class="sw" style="background:var(--ink-500);color:var(--paper-2)"><div class="meta"><b>Ink 500</b><span class="hex">#6E6A62</span></div></div>
<div class="sw" style="background:var(--ink-300);color:var(--paper-2)"><div class="meta"><b>Ink 300</b><span class="hex">#9A9488</span></div></div>
</div><div class="tok">Primary ink — sampled from the logo (rgb 44·46·53). Headings & text on cream.</div></body></html>
