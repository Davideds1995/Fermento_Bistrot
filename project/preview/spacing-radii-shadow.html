<!DOCTYPE html>
<html lang="it"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);background-image:var(--grain);padding:22px;color:var(--ink);font-family:var(--font-body);}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{flex:1;min-width:90px;border-radius:var(--r-sm);height:78px;border:1px solid var(--line);display:flex;align-items:flex-end;padding:8px}
  .sw b{font-family:var(--font-engrave);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase}
  .meta{display:flex;flex-direction:column;gap:2px}
  .hex{font-family:var(--font-engrave);font-size:.62rem;letter-spacing:.06em}
  .lbl{font-family:var(--font-engrave);text-transform:uppercase;letter-spacing:.14em;font-size:.6rem;color:var(--ink-500)}
  .tok{font-family:var(--font-engrave);font-size:.62rem;letter-spacing:.05em;color:var(--ink-500);margin-top:6px}
  *{box-sizing:border-box}
</style></head><body>
<div style="display:flex;gap:24px;align-items:center">
  <div style="text-align:center"><div style="width:80px;height:54px;background:var(--paper-2);border:1px solid var(--line-strong);border-radius:1px"></div><div class="tok" style="margin-top:8px">1–3px · quasi squadrato</div></div>
  <div style="text-align:center"><div style="width:80px;height:54px;background:var(--paper-2);border:1px solid var(--line);border-radius:3px;box-shadow:var(--shadow-card)"></div><div class="tok" style="margin-top:8px">shadow-card</div></div>
  <div style="text-align:center"><div style="width:80px;height:54px;background:var(--paper-2);border:1px solid var(--line);border-radius:3px;box-shadow:var(--shadow-raise)"></div><div class="tok" style="margin-top:8px">shadow-raise</div></div>
</div>
<div class="tok" style="margin-top:14px">Vintage = very low radii (1–3px). Soft, paper-like shadows; never glossy.</div></body></html>
