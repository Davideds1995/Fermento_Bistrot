<!DOCTYPE html>
<html lang="it"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);background-image:var(--grain);padding:22px;color:var(--ink);font-family:var(--font-body);}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{flex:1;min-width:90px;border-radius:var(--r-sm);height:78px;border:1px solid var(--line);display:flex;align-items:flex-end;padding:8px}
  .sw b{font-family:var(--font-engrave);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase}
  .meta{display:flex;flex-direction:column;gap:2px}
  .hex{font-family:var(--font-engrave);font-size:.62rem;letter-spacing:.06em}
  .lbl{font-family:var(--font-engrave);text-transform:uppercase;letter-spacing:.14em;font-size:.6rem;color:var(--ink-500)}
  .tok{font-family:var(--font-engrave);font-size:.62rem;letter-spacing:.05em;color:var(--ink-500);margin-top:6px}
  *{box-sizing:border-box}
</style></head><body>
<div style="display:flex;flex-direction:column;gap:6px">
  <div style="font-family:var(--font-display);font-weight:800;font-size:3rem;line-height:1;color:var(--ink-900)">Aa <span style="font-family:var(--font-engrave);font-size:.7rem;color:var(--ink-500);letter-spacing:.1em">DISPLAY · 96px</span></div>
  <div style="font-family:var(--font-display);font-weight:700;font-size:2rem;color:var(--ink-900)">Aa <span style="font-family:var(--font-engrave);font-size:.7rem;color:var(--ink-500);letter-spacing:.1em">H2 · 42px</span></div>
  <div style="font-family:var(--font-display);font-weight:600;font-size:1.4rem;color:var(--ink-900)">Aa <span style="font-family:var(--font-engrave);font-size:.7rem;color:var(--ink-500);letter-spacing:.1em">H3 · 24px</span></div>
  <div style="font-family:var(--font-body);font-size:1.12rem;color:var(--ink-700)">Aa <span style="font-family:var(--font-engrave);font-size:.7rem;color:var(--ink-500);letter-spacing:.1em">BODY · 18px</span></div>
  <div style="font-family:var(--font-engrave);font-size:.82rem;letter-spacing:.28em;color:var(--gold-deep)">AA <span style="letter-spacing:.1em;color:var(--ink-500)">EYEBROW · 13px</span></div>
</div></body></html>
